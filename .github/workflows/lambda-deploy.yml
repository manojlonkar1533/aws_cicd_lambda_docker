# .github/workflows/lambda-deploy.yml
name: Deploy Lambda Function

on:
  push:
    branches: [main]
    paths:
      - 'lambda/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FUNCTION_NAME: lambda-test-function
      HANDLER: handler.lambda_handler          # e.g. file.function_name
      RUNTIME: python3.11
      ROLE_ARN: ${{ secrets.AWS_LAMBDA_ROLE_ARN }}  # must exist and be able to run Lambdas

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          cd lambda
          pip install -r requirements.txt -t ./package
          cp *.py ./package/
      
      - name: Create deployment package
        run: |
          cd lambda/package
          zip -r ../lambda-deployment.zip .
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Create function if missing
        run: |
          set -euo pipefail
          # ensure zip exists
          if [ ! -f lambda/lambda-deployment.zip ]; then
            echo "Deployment zip not found!" >&2
            exit 1
          fi

          if aws lambda get-function --function-name "${FUNCTION_NAME}" >/dev/null 2>&1; then
            echo "Lambda ${FUNCTION_NAME} already exists."
          else
            echo "Lambda ${FUNCTION_NAME} not found — creating..."
            aws lambda create-function \
              --function-name "${FUNCTION_NAME}" \
              --runtime "${RUNTIME}" \
              --role "${ROLE_ARN}" \
              --handler "${HANDLER}" \
              --zip-file fileb://lambda/lambda-deployment.zip \
              --timeout 15 \
              --memory-size 128
          fi
      - name: Deploy to Lambda (update code)
        run: |
          aws lambda update-function-code \
            --function-name "${FUNCTION_NAME}" \
            --zip-file fileb://lambda/lambda-deployment.zip