name: Build and Push Lambda docker Image to ECR

on:
  push:
    branches: [ main ]
    paths:
      - 'services/**'
env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: lambda/layer        # exact name you created in ECR

permissions:
  id-token: write               # needed for OIDC
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Configure AWS credentials via OIDC and the IAM role you created
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::416418941336:role/GitHubActionsECRPush
          aws-region: ${{ env.AWS_REGION }}

      # 3. Login to ECR (gets a temporary Docker login)
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 4. Build and push Docker image
      - name: Build and push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}   # immutable tag based on commit
        run: |
          docker build \
            --file services/Dockerfile \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            services/
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

          echo "✅ Pushed:"
          echo "  $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          echo "  $ECR_REGISTRY/$ECR_REPOSITORY:latest"
      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster ecr-ecs-demo \
            --service ecr-ecs-demo-service \
            --force-new-deployment